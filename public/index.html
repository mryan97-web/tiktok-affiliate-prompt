<html lang="id">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<body>
  <div class="app-container">
    <!-- HEADER -->
    <header class="app-header">
      <div class="logo">
        <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
          <rect width="32" height="32" rx="8" fill="url(#g1)" />
          <path d="M8 24V8h4l4 12 4-12h4v16h-3.5V13.5L16 24l-4.5-10.5V24H8z" fill="#fff" />
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
              <stop stop-color="#FF6B35" />
              <stop offset="1" stop-color="#F7C948" />
            </linearGradient>
          </defs>
        </svg>
        <span><strong>PromptForge</strong></span>
        <span class="badge">TikTok Affiliate</span>
      </div>
      <div class="header-right">
        <a href="#" class="github-link" onclick="exportPrompt(event)">📋 Salin</a>
        <span class="api-status" id="apiStatus">⚪ Menunggu API Key</span>
      </div>
    </header>

    <main class="main-grid">
      <!-- LEFT: UPLOAD + DROPDOWNS -->
      <section class="input-panel">
        <!-- Upload Area -->
        <div class="upload-card">
          <div class="upload-zone" id="uploadZone">
            <div class="upload-placeholder" id="uploadPlaceholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
              </svg>
              <p><strong>Drag & drop gambar</strong> atau klik untuk upload</p>
              <small>Format: JPG, PNG, WEBP — Maks 10MB</small>
            </div>
            <img id="previewImage" class="preview-image hidden" alt="Preview" />
            <button class="btn-remove hidden" id="btnRemove" onclick="removeImage()">✕</button>
          </div>
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
        </div>

        <!-- Dropdown Panel -->
        <div class="controls-card">
          <div class="controls-header">
            <h3>🎛️ Detail Karakter</h3>
            <button class="btn-small" onclick="resetAll()">↺ Reset</button>
          </div>

          <div class="controls-grid">
            <!-- Row 1 -->
            <div class="control-group">
              <label>Gender</label>

                <option value="Non-binary">⚧ Non-binary / Androgynous</option>

            </div>

            <div class="control-group">
              <label>Etnis / Warna Kulit</label>

                <option value="Asian (East Asia)">Asian — East Asia (Cina, Jepang, Korea)</option>

                <option value="Ombre / Balayage">Ombre / Balayage — Gradasi</option>
                <option value="White / Grey natural">White — Putih / uban</option>
                <option value="Rainbow / Multicolor">🌈 Rainbow — Pelangi warna-warni</option>
              </select>
            </div>

            <!-- Extra detail area -->
            <div class="control-group full-width">
              <label>Detail Tambahan (opsional)</label>
              <textarea id="extraDetails" rows="2" placeholder="Misal: background warna pastel pink, baju oversize, pose santai sambil pegang produk skincare..."></textarea>
            </div>
          </div>

          <!-- GENERATE BUTTON -->
          <button class="btn-generate" id="btnGenerate" onclick="generatePrompt()" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            Generate Prompt
          </button>
        </div>
      </section>

      <!-- RIGHT: OUTPUT -->
      <section class="output-panel">
        <div class="output-header">
          <h3>📝 Hasil Prompt</h3>
          <div class="output-actions">
            <button class="btn-small" onclick="copyPrompt()">📋 Copy</button>
            <button class="btn-small" onclick="exportPrompt()">💾 Export</button>
          </div>
        </div>
        <div class="output-content" id="outputContent">
          <div class="output-empty" id="outputEmpty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10,9 9,9 8,9"/>
            </svg>
            <p>Upload gambar dan atur detail karakter</p>
            <small>Klik <strong>Generate Prompt</strong> untuk mulai</small>
          </div>
          <div id="outputResult" class="hidden"></div>
        </div>
        <div class="output-footer" id="outputFooter" class="hidden">
          <span class="token-count" id="tokenCount">—</span>
        </div>
      </section>
    </main>

    <!-- Loader overlay -->
    <div class="loader-overlay hidden" id="loaderOverlay">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>Menganalisis gambar...</p>
        <small>Gemini AI sedang memproses</small>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
